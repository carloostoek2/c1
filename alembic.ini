[alembic]
script_location = alembic
# Database URL is loaded from DATABASE_URL environment variable in alembic/env.py
# sqlalchemy.url = sqlite:///bot.db
# autogenerate with --sql creates a SQL script instead of a Python file.
# This option means that if `alembic.ini` specifies --sql, it will be used
# when calling `alembic revision --autogenerate`.
# For a full discussion, see:
#   https://alembic.sqlalchemy.org/en/latest/autogenerate.html#running-autogenerate-with-sql-output
# autogenerate.batch = False

# file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
# This section defines "post-write hooks" which are functions that Alembic will
# call after writing a new migration script to disk. These functions can be used
# to automatically format the new migration script (e.g., with Black or Ruff).
# For details, see:
#   https://alembic.sqlalchemy.org/en/latest/cookbook.html#post-write-hooks
# Example:
#   type = console_scripts
#   entrypoint = black
#   options = --fast

[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[logger_root]
level = INFO
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic